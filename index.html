<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#063b31"><title>9M Help Center</title>
<style>
:root{--bg:#043a30;--bg2:#032821;--panel:#073e34;--gold:#ffd756;--text:#fff;--muted:#b9d0ca;--line:rgba(255,215,86,.25)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 50% 5%,rgba(255,215,86,.14),transparent 25%),linear-gradient(180deg,var(--bg),var(--bg2));min-height:100vh}button,input{font:inherit}button{cursor:pointer}.wrap{width:min(1160px,calc(100% - 28px));margin:auto;padding:28px 0 105px}.hero{text-align:center}.logo{width:88px;height:88px;margin:auto;border-radius:16px;display:grid;place-items:center;background:linear-gradient(145deg,#fff,#eee5cf);color:#ba7100;font-size:42px;font-weight:900;box-shadow:0 15px 42px rgba(255,215,86,.2)}h1{font-size:clamp(36px,5vw,58px);margin:20px 0 12px;color:#ffe17a}.subtitle{color:var(--muted)}.langs{display:flex;justify-content:center;gap:9px;margin:16px}.lang{border:1px solid rgba(255,215,86,.42);background:rgba(255,255,255,.04);color:#fff;padding:9px 18px;border-radius:999px;font-weight:800}.lang.active{background:linear-gradient(#8d8129,#5a4f14);color:#fff4bd}.searchbox{position:relative;max-width:900px;margin:auto}.searchbox span{position:absolute;left:18px;top:50%;transform:translateY(-50%)}input{width:100%;height:58px;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(1,27,23,.75);color:#fff;padding:0 18px 0 50px;outline:none}.card{background:linear-gradient(180deg,rgba(4,54,45,.96),rgba(2,39,33,.96));border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 55px rgba(0,0,0,.24)}.announcement{margin-top:17px;padding:14px 16px;display:none}.announcement.show{display:block}.announcement.warning{border-color:#f1a93b}.announcement.critical{border-color:#ff6b6b}.statusbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:13px}.status{padding:12px;text-align:center}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}.normal .dot{background:#4ade80}.maintenance .dot{background:#facc15}.delayed .dot{background:#fb923c}.offline .dot{background:#f87171}.categories{padding:16px;margin-top:16px}.label{color:#ffe06c;font-weight:900;margin:0 0 13px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}.cat{min-height:58px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(20,77,66,.94),rgba(12,58,49,.94));color:#fff;font-weight:850;padding:10px}.cat.active{background:linear-gradient(#8d862e,#625b18);border-color:var(--gold)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:17px;margin-top:17px}.main,.sidecard{padding:16px}.head{display:flex;justify-content:space-between;gap:15px;align-items:end;margin-bottom:13px}.head h2,.sidecard h3{margin:0;color:#ffe06a}.hint,.count{color:var(--muted);font-size:14px}.list,.mini,.supportlist{display:flex;flex-direction:column;gap:9px}.item{border:1px solid rgba(255,215,86,.18);border-radius:14px;overflow:hidden;background:rgba(1,42,35,.7)}.q{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:16px;display:grid;grid-template-columns:38px 1fr 20px;gap:10px;align-items:center;font-weight:850}.num{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;background:rgba(255,215,86,.16);color:#ffe45d;font-size:13px}.plus{font-size:22px;color:var(--gold);transition:.2s}.item.open .plus{transform:rotate(45deg)}.answer{display:none;padding:0 18px 18px 64px;color:#d4e4df;line-height:1.7}.item.open .answer{display:block}.side{display:flex;flex-direction:column;gap:17px}.mini button{border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035);color:#fff;text-align:left;padding:11px;font-weight:750}.supportlink{color:#2b2000;font-weight:900;background:linear-gradient(#ffe681,#ffc52f);display:flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:13px;text-decoration:none}.empty{text-align:center;padding:40px;color:var(--muted)}.floating{position:fixed;right:18px;bottom:18px;z-index:9}.loading{padding:50px;text-align:center;color:var(--muted)}footer{text-align:center;color:#8ba49e;font-size:13px;margin-top:25px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.statusbar{grid-template-columns:1fr 1fr}.side{display:grid;grid-template-columns:1fr 1fr}}
@media(max-width:620px){.wrap{width:calc(100% - 18px);padding-top:18px}.logo{width:72px;height:72px;font-size:34px}.grid{grid-template-columns:1fr 1fr;gap:8px}.cat{font-size:13px}.categories,.main{padding:11px}.head{align-items:flex-start;flex-direction:column}.q{grid-template-columns:33px 1fr 18px;padding:14px 11px}.answer{padding:0 13px 16px 54px}.side{grid-template-columns:1fr}.floating{right:10px;bottom:10px}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><div class="logo">9M</div><h1>9M Help Center</h1><p class="subtitle" id="subtitle">ডিপোজিট, উইথড্র, বোনাস, VIP, এজেন্ট ও অ্যাকাউন্ট সংক্রান্ত উত্তর খুঁজুন।</p>
<div class="langs"><button class="lang active" data-lang="bn">বাংলা</button><button class="lang" data-lang="en">English</button></div>
<div class="searchbox"><span>🔎</span><input id="search" placeholder="ডিপোজিট, উইথড্র, এজেন্ট, VIP খুঁজুন..."></div></section>
<section id="announcement" class="card announcement"></section>
<section id="statusbar" class="statusbar"></section>
<section class="card categories"><div class="label" id="browse">ক্যাটাগরি অনুযায়ী দেখুন</div><div class="grid" id="cats"></div></section>
<section class="layout">
<div class="card main"><div class="head"><div><h2 id="title">জনপ্রিয় প্রশ্ন</h2><div class="hint" id="hint">উত্তর দেখতে প্রশ্নে চাপ দিন।</div></div><div class="count" id="count"></div></div><div id="list" class="list"><div class="loading">Loading…</div></div></div>
<aside class="side">
<div class="card sidecard"><h3 id="popularTitle">🔥 সবচেয়ে জনপ্রিয়</h3><div id="popular" class="mini"></div></div>
<div class="card sidecard"><h3 id="recentTitle">🕘 সম্প্রতি দেখা</h3><div id="recent" class="mini"></div></div>
<div class="card sidecard"><h3 id="supportTitle">💬 সাপোর্ট</h3><div id="supportList" class="supportlist"></div></div>
</aside></section><footer>© 9M Help Center · Dynamic Knowledge Center</footer></div>
<div id="floating"></div>
<script>
const COPY={bn:{subtitle:"ডিপোজিট, উইথড্র, বোনাস, VIP, এজেন্ট ও অ্যাকাউন্ট সংক্রান্ত উত্তর খুঁজুন।",search:"ডিপোজিট, উইথড্র, এজেন্ট, VIP খুঁজুন...",browse:"ক্যাটাগরি অনুযায়ী দেখুন",hint:"উত্তর দেখতে প্রশ্নে চাপ দিন।",popular:"🔥 সবচেয়ে জনপ্রিয়",recent:"🕘 সম্প্রতি দেখা",support:"💬 সাপোর্ট",empty:"কোনো মিল পাওয়া যায়নি।",count:n=>n+"টি প্রশ্ন"},en:{subtitle:"Find answers about deposits, withdrawals, bonuses, VIP, agents and account services.",search:"Search for deposit, withdrawal, agent, VIP...",browse:"Browse by category",hint:"Tap a question to view the answer.",popular:"🔥 Most Popular",recent:"🕘 Recently Viewed",support:"💬 Support",empty:"No matching questions found.",count:n=>n+" question"+(n===1?"":"s")}};
let DATA={categories:[],articles:[],announcements:[],service_status:[],support_channels:[]};
let state={lang:"bn",cat:"popular",query:"",recent:JSON.parse(localStorage.getItem("9m_recent_dynamic")||"[]")};
const $=id=>document.getElementById(id);
function txt(row,field){return row[field+"_"+state.lang]||row[field+"_en"]||""}
async function load(){try{const r=await fetch("/api/public");if(!r.ok)throw new Error("API error");DATA=await r.json();render()}catch(e){$("list").innerHTML='<div class="empty">Unable to load content. Please check configuration.</div>';console.error(e)}}
function renderCopy(){const c=COPY[state.lang];$("subtitle").textContent=c.subtitle;$("search").placeholder=c.search;$("browse").textContent=c.browse;$("hint").textContent=c.hint;$("popularTitle").textContent=c.popular;$("recentTitle").textContent=c.recent;$("supportTitle").textContent=c.support;document.documentElement.lang=state.lang}
function renderAnnouncement(){const a=DATA.announcements?.[0];const el=$("announcement");if(!a){el.className="card announcement";return}el.className="card announcement show "+a.level;el.innerHTML=`<strong>📢 ${txt(a,"title")}</strong>${txt(a,"body")?`<div class="hint" style="margin-top:5px">${txt(a,"body")}</div>`:""}`}
function renderStatus(){$("statusbar").innerHTML=(DATA.service_status||[]).map(x=>`<div class="card status ${x.state}"><span class="dot"></span><strong>${txt(x,"label")}</strong>${txt(x,"note")?`<div class="hint">${txt(x,"note")}</div>`:""}</div>`).join("")}
function renderCats(){const cats=[{slug:"popular",icon:"🔥",name_en:"Popular Questions",name_bn:"জনপ্রিয় প্রশ্ন"},...(DATA.categories||[]).filter(x=>x.slug!=="popular")];$("cats").innerHTML=cats.map(c=>`<button class="cat ${state.cat===c.slug&&!state.query?"active":""}" data-id="${c.slug}">${c.icon} ${txt(c,"name")}</button>`).join("");document.querySelectorAll(".cat").forEach(b=>b.onclick=()=>{state.cat=b.dataset.id;state.query="";$("search").value="";render()})}
function items(){let a=state.cat==="popular"?DATA.articles.filter(x=>x.is_popular):DATA.articles.filter(x=>x.categories?.slug===state.cat);if(state.query){const q=state.query.toLowerCase();a=DATA.articles.filter(x=>[x.title_en,x.title_bn,x.content_en,x.content_bn,x.keywords_en,x.keywords_bn].join(" ").toLowerCase().includes(q))}return a}
function renderList(){const a=items();$("title").textContent=state.query?(state.lang==="bn"?"সার্চ ফলাফল":"Search Results"):(state.cat==="popular"?(state.lang==="bn"?"জনপ্রিয় প্রশ্ন":"Popular Questions"):txt(DATA.categories.find(x=>x.slug===state.cat)||{},"name"));$("count").textContent=COPY[state.lang].count(a.length);$("list").innerHTML=a.length?a.map((x,i)=>`<div class="item" data-id="${x.id}"><button class="q"><span class="num">${String(i+1).padStart(2,"0")}</span><span>${txt(x,"title")}</span><span class="plus">+</span></button><div class="answer">${txt(x,"content")}</div></div>`).join(""):`<div class="empty">${COPY[state.lang].empty}</div>`;document.querySelectorAll(".item").forEach((el,i)=>el.querySelector(".q").onclick=()=>{el.classList.toggle("open");if(el.classList.contains("open"))view(a[i])})}
function view(x){state.recent=[x.id,...state.recent.filter(id=>id!==x.id)].slice(0,5);localStorage.setItem("9m_recent_dynamic",JSON.stringify(state.recent));renderRecent();fetch("/api/public",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"article_view",article_id:x.id,language:state.lang})}).catch(()=>{})}
function renderPopular(){const a=DATA.articles.filter(x=>x.is_popular).sort((x,y)=>y.view_count-x.view_count).slice(0,5);$("popular").innerHTML=a.map(x=>`<button data-id="${x.id}">${txt(x,"title")}</button>`).join("");$("popular").querySelectorAll("button").forEach(b=>b.onclick=()=>openById(b.dataset.id))}
function renderRecent(){const a=state.recent.map(id=>DATA.articles.find(x=>x.id===id)).filter(Boolean);$("recent").innerHTML=a.length?a.map(x=>`<button data-id="${x.id}">${txt(x,"title")}</button>`).join(""):`<div class="hint">${state.lang==="bn"?"সম্প্রতি দেখা কোনো প্রশ্ন নেই।":"No recently viewed questions."}</div>`;$("recent").querySelectorAll("button").forEach(b=>b.onclick=()=>openById(b.dataset.id))}
function openById(id){const x=DATA.articles.find(x=>x.id===id);if(!x)return;state.cat=x.categories?.slug||"popular";state.query="";$("search").value="";render();setTimeout(()=>{const el=document.querySelector(`.item[data-id="${id}"]`);if(el){el.querySelector(".q").click();el.scrollIntoView({behavior:"smooth",block:"center"})}},20)}
function renderSupport(){const a=DATA.support_channels||[];$("supportList").innerHTML=a.map(x=>`<a class="supportlink" target="_blank" rel="noopener" href="${x.url}">${x.icon} ${txt(x,"label")}</a>`).join("");$("floating").innerHTML=a[0]?`<a class="supportlink floating" target="_blank" rel="noopener" href="${a[0].url}">${a[0].icon} ${txt(a[0],"label")}</a>`:""}
function render(){renderCopy();renderAnnouncement();renderStatus();renderCats();renderList();renderPopular();renderRecent();renderSupport()}
document.querySelectorAll(".lang").forEach(b=>b.onclick=()=>{state.lang=b.dataset.lang;document.querySelectorAll(".lang").forEach(x=>x.classList.toggle("active",x===b));render()});
let timer;$("search").addEventListener("input",e=>{state.query=e.target.value.trim();renderCats();renderList();clearTimeout(timer);timer=setTimeout(()=>{if(state.query)fetch("/api/public",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"search_log",query:state.query,language:state.lang,result_count:items().length})}).catch(()=>{})},700)});
load();
</script>
</body></html>
