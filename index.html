<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#04382f">
<title>9M Help Center</title>
<style>
:root{--bg:#032b24;--bg2:#021d19;--panel:#063d33;--panel2:#0a4a3d;--gold:#ffd85c;--gold2:#ffb91f;--text:#fff;--muted:#b7cec7;--line:rgba(255,216,92,.22);--ok:#48d985;--warn:#ffc94a;--danger:#ff6f6f}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 50% 0,rgba(255,216,92,.13),transparent 23%),radial-gradient(circle at 8% 72%,rgba(13,112,88,.25),transparent 32%),linear-gradient(180deg,#064338 0%,var(--bg2) 100%);min-height:100vh}button,input{font:inherit}button{cursor:pointer}.wrap{width:min(1160px,calc(100% - 26px));margin:auto;padding:24px 0 100px}.hero{text-align:center;padding:8px 0 18px}.logo{width:84px;height:84px;margin:auto;border-radius:17px;display:grid;place-items:center;background:linear-gradient(145deg,#fffdf7,#eee5ce);color:#b96d00;font-weight:950;font-size:39px;box-shadow:0 18px 45px rgba(255,205,52,.2)}h1{font-size:clamp(35px,5vw,56px);line-height:1;margin:20px 0 11px;color:#ffe27c;letter-spacing:-1.3px}.subtitle{max-width:760px;margin:0 auto;color:var(--muted);line-height:1.55}.langs{display:flex;justify-content:center;gap:9px;margin:16px 0}.lang{border:1px solid rgba(255,216,92,.4);background:rgba(255,255,255,.04);color:#fff;padding:9px 18px;border-radius:999px;font-weight:850}.lang.active{background:linear-gradient(#90862e,#625818);color:#fff9c9}.searchbox{max-width:900px;margin:auto;position:relative}.searchbox span{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:21px}.searchbox input{width:100%;height:58px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(1,26,22,.76);color:#fff;padding:0 50px;outline:none}.searchbox input:focus{border-color:rgba(255,216,92,.62);box-shadow:0 0 0 3px rgba(255,216,92,.08)}.clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:#8da9a1;font-size:22px}.card{background:linear-gradient(180deg,rgba(5,57,48,.96),rgba(2,39,33,.97));border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 56px rgba(0,0,0,.24)}.announcement{display:none;margin-top:16px;padding:15px 17px}.announcement.show{display:block}.announcement.warning{border-color:rgba(255,201,74,.75)}.announcement.critical{border-color:rgba(255,111,111,.75)}.statusbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.status{padding:12px 11px;text-align:center}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}.normal .dot{background:var(--ok);box-shadow:0 0 12px rgba(72,217,133,.5)}.maintenance .dot{background:var(--warn)}.delayed .dot{background:#ff9448}.offline .dot{background:var(--danger)}.categories{padding:16px;margin-top:16px}.label{color:#ffe06a;font-weight:900;margin:0 0 13px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.cat{min-height:59px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(20,78,66,.94),rgba(11,57,49,.94));color:#fff;padding:10px;font-weight:850;transition:.18s}.cat:hover{transform:translateY(-2px);border-color:rgba(255,216,92,.45)}.cat.active{background:linear-gradient(#8d862f,#625b18);border-color:var(--gold);color:#fff9c8}.layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;margin-top:16px}.main,.sidecard{padding:16px}.head{display:flex;justify-content:space-between;align-items:end;gap:15px;margin-bottom:13px}.head h2,.sidecard h3{margin:0;color:#ffe06a}.hint,.count{font-size:14px;color:var(--muted)}.list,.mini,.supportlist{display:flex;flex-direction:column;gap:9px}.item{border:1px solid rgba(255,216,92,.17);border-radius:14px;overflow:hidden;background:rgba(1,42,35,.68)}.q{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:16px;display:grid;grid-template-columns:39px 1fr 20px;gap:10px;align-items:center;font-weight:850}.q:hover{background:rgba(255,255,255,.025)}.num{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;background:rgba(255,216,92,.15);color:#ffe35c;font-size:13px}.plus{font-size:22px;color:var(--gold);transition:.2s}.item.open .plus{transform:rotate(45deg)}.answer{display:none;padding:0 18px 17px 65px;color:#d4e5df;line-height:1.72}.item.open .answer{display:block}.article-tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px;padding-top:12px;border-top:1px solid rgba(255,255,255,.07)}.feedback{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;border-radius:9px;padding:8px 11px}.feedback:hover{border-color:rgba(255,216,92,.45)}.side{display:flex;flex-direction:column;gap:16px}.mini button{border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035);color:#fff;text-align:left;padding:11px;font-weight:760}.mini button:hover{border-color:rgba(255,216,92,.38)}.supportlink{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;color:#2b2000;font-weight:900;border-radius:12px;padding:13px;background:linear-gradient(#ffe681,#ffc52f);box-shadow:0 12px 25px rgba(0,0,0,.2)}.empty,.loading{text-align:center;padding:42px 20px;color:var(--muted)}.errorbox{padding:18px;border:1px solid rgba(255,111,111,.5);background:rgba(255,111,111,.07);border-radius:14px;color:#ffd1d1}.floating{position:fixed;right:16px;bottom:16px;z-index:20}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:#102e28;border:1px solid var(--line);padding:11px 16px;border-radius:999px;transition:.2s;z-index:30}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}footer{text-align:center;color:#88a49c;font-size:13px;margin-top:25px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}.statusbar{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.wrap{width:calc(100% - 18px);padding-top:18px}.logo{width:72px;height:72px;font-size:34px}h1{font-size:38px}.grid{grid-template-columns:1fr 1fr;gap:8px}.cat{min-height:54px;font-size:13px}.categories,.main{padding:11px}.head{align-items:flex-start;flex-direction:column}.q{grid-template-columns:33px 1fr 18px;padding:14px 11px}.answer{padding:0 13px 16px 54px}.side{grid-template-columns:1fr}.floating{right:10px;bottom:10px}.statusbar{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero">
<div class="logo">9M</div>
<h1>9M Help Center</h1>
<p id="subtitle" class="subtitle">ডিপোজিট, উইথড্র, বোনাস, VIP, এজেন্ট ও অ্যাকাউন্ট সংক্রান্ত উত্তর খুঁজুন।</p>
<div class="langs"><button class="lang active" data-lang="bn">বাংলা</button><button class="lang" data-lang="en">English</button></div>
<div class="searchbox"><span>🔎</span><input id="search" placeholder="ডিপোজিট, উইথড্র, এজেন্ট, VIP খুঁজুন..."><button id="clear" class="clear">×</button></div>
</section>
<section id="announcement" class="card announcement"></section>
<section id="statusbar" class="statusbar"></section>
<section class="card categories"><div id="browse" class="label">ক্যাটাগরি অনুযায়ী দেখুন</div><div id="cats" class="grid"></div></section>
<section class="layout">
<div class="card main">
<div class="head"><div><h2 id="title">জনপ্রিয় প্রশ্ন</h2><div id="hint" class="hint">উত্তর দেখতে প্রশ্নে চাপ দিন।</div></div><div id="count" class="count"></div></div>
<div id="list" class="list"><div class="loading">Loading…</div></div>
</div>
<aside class="side">
<div class="card sidecard"><h3 id="popularTitle">🔥 সবচেয়ে জনপ্রিয়</h3><div id="popular" class="mini"></div></div>
<div class="card sidecard"><h3 id="recentTitle">🕘 সম্প্রতি দেখা</h3><div id="recent" class="mini"></div></div>
<div class="card sidecard"><h3 id="supportTitle">💬 সাপোর্ট</h3><div id="supportList" class="supportlist"></div></div>
</aside>
</section>
<footer>© 9M Help Center · Dynamic Knowledge Center</footer>
</div>
<div id="floating"></div><div id="toast" class="toast"></div>
<script>
const COPY={bn:{subtitle:"ডিপোজিট, উইথড্র, বোনাস, VIP, এজেন্ট ও অ্যাকাউন্ট সংক্রান্ত উত্তর খুঁজুন।",search:"ডিপোজিট, উইথড্র, এজেন্ট, VIP খুঁজুন...",browse:"ক্যাটাগরি অনুযায়ী দেখুন",hint:"উত্তর দেখতে প্রশ্নে চাপ দিন।",popular:"🔥 সবচেয়ে জনপ্রিয়",recent:"🕘 সম্প্রতি দেখা",support:"💬 সাপোর্ট",empty:"কোনো মিল পাওয়া যায়নি।",count:n=>n+"টি প্রশ্ন",yes:"👍 সমাধান হয়েছে",no:"👎 সমাধান হয়নি",copy:"লিংক কপি",copied:"কপি হয়েছে",error:"কনটেন্ট লোড করা যায়নি। Environment variables পরীক্ষা করুন।"},en:{subtitle:"Find answers about deposits, withdrawals, bonuses, VIP, agents and account services.",search:"Search for deposit, withdrawal, agent, VIP...",browse:"Browse by category",hint:"Tap a question to view the answer.",popular:"🔥 Most Popular",recent:"🕘 Recently Viewed",support:"💬 Support",empty:"No matching questions found.",count:n=>n+" question"+(n===1?"":"s"),yes:"👍 Solved",no:"👎 Not solved",copy:"Copy link",copied:"Copied",error:"Unable to load content. Check the environment variables."}};
let DATA={categories:[],articles:[],announcements:[],service_status:[],support_channels:[]};
let state={lang:"bn",cat:"popular",query:"",recent:JSON.parse(localStorage.getItem("9m_recent_pro")||"[]")};
const $=id=>document.getElementById(id),txt=(r,f)=>r?.[f+"_"+state.lang]||r?.[f+"_en"]||"";
function toast(t){$("toast").textContent=t;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1600)}
async function load(){try{const r=await fetch("/api/public",{cache:"no-store"});const j=await r.json();if(!r.ok)throw new Error(j.error||"API error");DATA=j;render();const hash=location.hash.replace("#article-","");if(hash)setTimeout(()=>openById(hash),100)}catch(e){$("list").innerHTML=`<div class="errorbox"><strong>${COPY[state.lang].error}</strong><div class="hint" style="margin-top:8px">${e.message}</div><div class="hint" style="margin-top:8px">Test: <code>/api/health</code></div></div>`;console.error(e)}}
function renderCopy(){const c=COPY[state.lang];$("subtitle").textContent=c.subtitle;$("search").placeholder=c.search;$("browse").textContent=c.browse;$("hint").textContent=c.hint;$("popularTitle").textContent=c.popular;$("recentTitle").textContent=c.recent;$("supportTitle").textContent=c.support;document.documentElement.lang=state.lang}
function renderAnnouncement(){const a=DATA.announcements?.[0],el=$("announcement");if(!a){el.className="card announcement";return}el.className="card announcement show "+a.level;el.innerHTML=`<strong>📢 ${txt(a,"title")}</strong>${txt(a,"body")?`<div class="hint" style="margin-top:5px">${txt(a,"body")}</div>`:""}`}
function renderStatus(){$("statusbar").innerHTML=(DATA.service_status||[]).map(x=>`<div class="card status ${x.state}"><span class="dot"></span><strong>${txt(x,"label")}</strong>${txt(x,"note")?`<div class="hint">${txt(x,"note")}</div>`:""}</div>`).join("")}
function cats(){return [{slug:"popular",icon:"🔥",name_en:"Popular Questions",name_bn:"জনপ্রিয় প্রশ্ন"},...(DATA.categories||[]).filter(x=>x.slug!=="popular")]}
function renderCats(){$("cats").innerHTML=cats().map(c=>`<button class="cat ${state.cat===c.slug&&!state.query?"active":""}" data-id="${c.slug}">${c.icon} ${txt(c,"name")}</button>`).join("");document.querySelectorAll(".cat").forEach(b=>b.onclick=()=>{state.cat=b.dataset.id;state.query="";$("search").value="";render()})}
function items(){let a=state.cat==="popular"?DATA.articles.filter(x=>x.is_popular):DATA.articles.filter(x=>x.categories?.slug===state.cat);if(state.query){const q=state.query.toLowerCase();a=DATA.articles.filter(x=>[x.title_en,x.title_bn,x.content_en,x.content_bn,x.keywords_en,x.keywords_bn].join(" ").toLowerCase().includes(q))}return a}
function renderList(){const a=items(),c=COPY[state.lang];$("title").textContent=state.query?(state.lang==="bn"?"সার্চ ফলাফল":"Search Results"):(state.cat==="popular"?(state.lang==="bn"?"জনপ্রিয় প্রশ্ন":"Popular Questions"):txt(DATA.categories.find(x=>x.slug===state.cat)||{},"name"));$("count").textContent=c.count(a.length);$("list").innerHTML=a.length?a.map((x,i)=>`<div class="item" data-id="${x.id}"><button class="q"><span class="num">${String(i+1).padStart(2,"0")}</span><span>${txt(x,"title")}</span><span class="plus">+</span></button><div class="answer">${txt(x,"content")}<div class="article-tools"><button class="feedback yes">${c.yes}</button><button class="feedback no">${c.no}</button><button class="feedback copy">${c.copy}</button></div></div></div>`).join(""):`<div class="empty">${c.empty}</div>`;document.querySelectorAll(".item").forEach((el,i)=>{el.querySelector(".q").onclick=()=>{el.classList.toggle("open");if(el.classList.contains("open"))view(a[i])};el.querySelector(".yes").onclick=()=>toast(COPY[state.lang].yes);el.querySelector(".no").onclick=()=>{toast(COPY[state.lang].no);document.querySelector(".floating")?.click()};el.querySelector(".copy").onclick=async()=>{location.hash="article-"+a[i].id;await navigator.clipboard.writeText(location.href);toast(COPY[state.lang].copied)}})}
function view(x){state.recent=[x.id,...state.recent.filter(id=>id!==x.id)].slice(0,5);localStorage.setItem("9m_recent_pro",JSON.stringify(state.recent));renderRecent();fetch("/api/public",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"article_view",article_id:x.id,language:state.lang})}).catch(()=>{})}
function renderPopular(){const a=DATA.articles.filter(x=>x.is_popular).sort((x,y)=>(y.view_count||0)-(x.view_count||0)).slice(0,5);$("popular").innerHTML=a.map(x=>`<button data-id="${x.id}">${txt(x,"title")}</button>`).join("");$("popular").querySelectorAll("button").forEach(b=>b.onclick=()=>openById(b.dataset.id))}
function renderRecent(){const a=state.recent.map(id=>DATA.articles.find(x=>x.id===id)).filter(Boolean);$("recent").innerHTML=a.length?a.map(x=>`<button data-id="${x.id}">${txt(x,"title")}</button>`).join(""):`<div class="hint">${state.lang==="bn"?"সম্প্রতি দেখা কোনো প্রশ্ন নেই।":"No recently viewed questions."}</div>`;$("recent").querySelectorAll("button").forEach(b=>b.onclick=()=>openById(b.dataset.id))}
function openById(id){const x=DATA.articles.find(x=>String(x.id)===String(id));if(!x)return;state.cat=x.categories?.slug||"popular";state.query="";$("search").value="";render();setTimeout(()=>{const el=document.querySelector(`.item[data-id="${id}"]`);if(el){el.querySelector(".q").click();el.scrollIntoView({behavior:"smooth",block:"center"})}},40)}
function renderSupport(){const a=DATA.support_channels||[];$("supportList").innerHTML=a.map(x=>`<a class="supportlink" target="_blank" rel="noopener" href="${x.url}">${x.icon} ${txt(x,"label")}</a>`).join("");$("floating").innerHTML=a[0]?`<a class="supportlink floating" target="_blank" rel="noopener" href="${a[0].url}">${a[0].icon} ${txt(a[0],"label")}</a>`:""}
function render(){renderCopy();renderAnnouncement();renderStatus();renderCats();renderList();renderPopular();renderRecent();renderSupport()}
document.querySelectorAll(".lang").forEach(b=>b.onclick=()=>{state.lang=b.dataset.lang;document.querySelectorAll(".lang").forEach(x=>x.classList.toggle("active",x===b));render()});
let timer;$("search").addEventListener("input",e=>{state.query=e.target.value.trim();renderCats();renderList();clearTimeout(timer);timer=setTimeout(()=>{if(state.query)fetch("/api/public",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"search_log",query:state.query,language:state.lang,result_count:items().length})}).catch(()=>{})},650)});
$("clear").onclick=()=>{state.query="";$("search").value="";renderCats();renderList()};
load();
</script>
</body>
</html>
