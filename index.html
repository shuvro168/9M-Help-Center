<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>9M Knowledge Center</title>
<style>
:root{--g:#ffd85c;--m:#b8cec7;--l:rgba(255,216,92,.22)}*{box-sizing:border-box}body{margin:0;font-family:system-ui;color:#fff;background:radial-gradient(circle at 50% 0,rgba(255,216,92,.13),transparent 24%),linear-gradient(#064439,#021c18);min-height:100vh}.w{width:min(1180px,calc(100% - 24px));margin:auto;padding:25px 0 95px}.hero{text-align:center}.logo{width:82px;height:82px;margin:auto;display:grid;place-items:center;border-radius:17px;background:#fff7e7;color:#b86b00;font-size:38px;font-weight:900}h1{font-size:clamp(35px,5vw,56px);margin:18px 0 8px;color:#ffe27c}.muted{color:var(--m)}button,input{font:inherit}.langs{display:flex;justify-content:center;gap:9px;margin:15px}.lang,.cat,.mini button,.tool{cursor:pointer;color:#fff;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);border-radius:11px}.lang{padding:9px 18px}.lang.active,.cat.active{background:linear-gradient(#90862e,#625818);border-color:var(--g)}.search{max-width:900px;margin:auto;position:relative}.search input{width:100%;height:58px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:#031f1a;color:#fff;padding:0 50px}.search span{position:absolute;left:18px;top:18px}.clear{position:absolute;right:14px;top:13px;border:0;background:none;color:#9ab0aa;font-size:22px}.card{background:linear-gradient(rgba(5,57,48,.97),rgba(2,39,33,.98));border:1px solid var(--l);border-radius:18px;box-shadow:0 18px 56px rgba(0,0,0,.24)}.notice{padding:15px;margin-top:16px}.statusbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.status{text-align:center;padding:12px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#44db84;margin-right:6px}.cats{padding:16px;margin-top:16px}.label,h2,h3{color:#ffe06a}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.cat{min-height:58px;font-weight:800}.layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;margin-top:16px}.main,.sidecard{padding:16px}.head{display:flex;justify-content:space-between;align-items:end}.list,.mini,.support{display:flex;flex-direction:column;gap:9px}.item{border:1px solid rgba(255,216,92,.17);border-radius:14px;overflow:hidden;background:rgba(1,42,35,.68)}.q{width:100%;border:0;background:none;color:#fff;text-align:left;padding:16px;display:grid;grid-template-columns:38px 1fr 20px;gap:10px;font-weight:800;cursor:pointer}.num{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;background:rgba(255,216,92,.15);color:#ffe35c}.ans{display:none;padding:0 18px 17px 64px;color:#d4e5df;line-height:1.7;white-space:pre-line}.item.open .ans{display:block}.item.open .plus{transform:rotate(45deg)}.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tool{padding:8px 11px}.side{display:flex;flex-direction:column;gap:16px}.mini button{padding:11px;text-align:left}.supportlink{display:flex;justify-content:center;text-decoration:none;color:#2b2000;background:linear-gradient(#ffe681,#ffc52f);padding:13px;border-radius:12px;font-weight:900}.empty{text-align:center;padding:35px;color:var(--m)}.floating{position:fixed;right:14px;bottom:14px}.mode{font-size:12px;margin-top:7px;color:#91aaa3}footer{text-align:center;color:#88a49c;margin-top:25px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:620px){.grid{grid-template-columns:1fr 1fr}.statusbar{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.w{width:calc(100% - 18px)}.q{grid-template-columns:33px 1fr 18px;padding:14px 11px}.ans{padding:0 13px 16px 54px}}
</style></head><body><div class="w"><section class="hero"><div class="logo">9M</div><h1>9M Knowledge Center</h1><p id="sub" class="muted"></p><div class="langs"><button class="lang active" data-l="bn">বাংলা</button><button class="lang" data-l="en">English</button></div><div class="search"><span>🔎</span><input id="search"><button class="clear" id="clear">×</button></div><div class="mode" id="mode"></div></section><section class="card notice" id="notice"></section><section class="statusbar" id="status"></section><section class="card cats"><h3 id="browse"></h3><div class="grid" id="cats"></div></section><section class="layout"><div class="card main"><div class="head"><div><h2 id="title"></h2><div id="hint" class="muted"></div></div><div id="count" class="muted"></div></div><div class="list" id="list"></div></div><aside class="side"><div class="card sidecard"><h3 id="popularTitle"></h3><div class="mini" id="popular"></div></div><div class="card sidecard"><h3 id="recentTitle"></h3><div class="mini" id="recent"></div></div><div class="card sidecard"><h3 id="supportTitle"></h3><div class="support" id="support"></div></div></aside></section><footer>© 9M Knowledge Center</footer></div><div id="float"></div>
<script src="config.js"></script><script src="seed-data.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
const C={bn:{sub:"প্ল্যাটফর্ম নিয়ম, ডিপোজিট, উইথড্র, রিওয়ার্ড, টাস্ক ও এজেন্ট তথ্য খুঁজুন।",search:"ডিপোজিট, উইথড্র, রিওয়ার্ড, এজেন্ট খুঁজুন...",browse:"ক্যাটাগরি অনুযায়ী দেখুন",hint:"উত্তর দেখতে প্রশ্নে চাপ দিন।",popular:"🔥 জনপ্রিয় প্রশ্ন",recent:"🕘 সম্প্রতি দেখা",support:"💬 সাপোর্ট",empty:"কোনো মিল পাওয়া যায়নি।",count:n=>n+"টি প্রশ্ন",live:"লাইভ ডাটাবেস",fallback:"তাৎক্ষণিক প্রদর্শন মোড"},en:{sub:"Find platform rules, deposits, withdrawals, rewards, tasks and agent information.",search:"Search deposits, withdrawals, rewards, agents...",browse:"Browse by category",hint:"Tap a question to view the answer.",popular:"🔥 Popular Questions",recent:"🕘 Recently Viewed",support:"💬 Support",empty:"No matching questions found.",count:n=>n+" questions",live:"Live database",fallback:"Instant fallback mode"}};let D=window.SEED_DATA,S={l:"bn",cat:"popular",q:"",recent:JSON.parse(localStorage.getItem("kc_recent")||"[]")},live=false;const $=x=>document.getElementById(x),t=(o,f)=>o?.[f+"_"+S.l]||o?.[f+"_en"]||o?.[f+"_bn"]||"";async function load(){const c=window.APP_CONFIG||{};if(c.SUPABASE_ANON_KEY&&!c.SUPABASE_ANON_KEY.includes("PASTE_"))try{const sb=supabase.createClient(c.SUPABASE_URL,c.SUPABASE_ANON_KEY),r=await Promise.all([sb.from("kc_categories").select("*").eq("is_active",true).order("sort_order"),sb.from("kc_articles").select("*").eq("status","published").order("sort_order"),sb.from("kc_announcements").select("*").eq("is_active",true),sb.from("kc_service_status").select("*"),sb.from("kc_support_channels").select("*").eq("is_active",true)]);if(r.some(x=>x.error))throw 0;D={categories:r[0].data,articles:r[1].data,announcements:r[2].data,service_status:r[3].data,support_channels:r[4].data};live=true}catch(e){}render()}function items(){let a=S.cat==="popular"?D.articles.filter(x=>x.is_popular===true||x.is_popular==="true"||x.is_popular==="TRUE"):D.articles.filter(x=>x.category_slug===S.cat);if(S.q){let q=S.q.toLowerCase();a=D.articles.filter(x=>[x.title_en,x.title_bn,x.content_en,x.content_bn,x.keywords_en,x.keywords_bn].join(" ").toLowerCase().includes(q))}return a}function render(){let c=C[S.l];$("sub").textContent=c.sub;$("search").placeholder=c.search;$("browse").textContent=c.browse;$("hint").textContent=c.hint;$("popularTitle").textContent=c.popular;$("recentTitle").textContent=c.recent;$("supportTitle").textContent=c.support;$("mode").textContent="● "+(live?c.live:c.fallback);let n=D.announcements[0];$("notice").innerHTML="<b>📢 "+t(n,"title")+"</b><div class=muted>"+t(n,"body")+"</div>";$("status").innerHTML=D.service_status.map(x=>`<div class="card status"><span class=dot></span><b>${t(x,"label")}</b></div>`).join("");let cc=[{slug:"popular",icon:"🔥",name_en:"Popular Questions",name_bn:"জনপ্রিয় প্রশ্ন"},...D.categories];$("cats").innerHTML=cc.map(x=>`<button class="cat ${S.cat===x.slug&&!S.q?"active":""}" data-c="${x.slug}">${x.icon} ${t(x,"name")}</button>`).join("");document.querySelectorAll(".cat").forEach(b=>b.onclick=()=>{S.cat=b.dataset.c;S.q="";$("search").value="";render()});let a=items();$("title").textContent=S.q?(S.l==="bn"?"সার্চ ফলাফল":"Search Results"):(S.cat==="popular"?(S.l==="bn"?"জনপ্রিয় প্রশ্ন":"Popular Questions"):t(D.categories.find(x=>x.slug===S.cat),"name"));$("count").textContent=c.count(a.length);$("list").innerHTML=a.length?a.map((x,i)=>`<div class=item data-id="${x.id}"><button class=q><span class=num>${String(i+1).padStart(2,"0")}</span><span>${t(x,"title")}</span><span class=plus>+</span></button><div class=ans>${t(x,"content")}<div class=tools><button class=tool>👍</button><button class=tool>👎</button></div></div></div>`).join(""):`<div class=empty>${c.empty}</div>`;document.querySelectorAll(".item").forEach((e,i)=>e.querySelector(".q").onclick=()=>{e.classList.toggle("open");if(e.classList.contains("open")){let x=a[i];S.recent=[x.id,...S.recent.filter(z=>z!==x.id)].slice(0,5);localStorage.setItem("kc_recent",JSON.stringify(S.recent));renderRecent()}});$("popular").innerHTML=D.articles.filter(x=>x.is_popular===true||x.is_popular==="true"||x.is_popular==="TRUE").slice(0,6).map(x=>`<button data-id="${x.id}">${t(x,"title")}</button>`).join("");$("popular").querySelectorAll("button").forEach(b=>b.onclick=()=>openId(b.dataset.id));renderRecent();$("support").innerHTML=D.support_channels.map(x=>`<a class=supportlink target=_blank href="${x.url}">${x.icon} ${t(x,"label")}</a>`).join("");$("float").innerHTML=D.support_channels[0]?`<a class="supportlink floating" target=_blank href="${D.support_channels[0].url}">${D.support_channels[0].icon} ${t(D.support_channels[0],"label")}</a>`:"";function renderRecent(){let a=S.recent.map(id=>D.articles.find(x=>String(x.id)===String(id))).filter(Boolean);$("recent").innerHTML=a.length?a.map(x=>`<button data-id="${x.id}">${t(x,"title")}</button>`).join(""):`<div class=muted>${S.l==="bn"?"সম্প্রতি দেখা কোনো প্রশ্ন নেই।":"No recently viewed questions."}</div>`;$("recent").querySelectorAll("button").forEach(b=>b.onclick=()=>openId(b.dataset.id))}}function openId(id){let x=D.articles.find(x=>String(x.id)===String(id));if(!x)return;S.cat=x.category_slug;S.q="";$("search").value="";render();setTimeout(()=>document.querySelector(`.item[data-id="${id}"] .q`)?.click(),20)}document.querySelectorAll(".lang").forEach(b=>b.onclick=()=>{S.l=b.dataset.l;document.querySelectorAll(".lang").forEach(x=>x.classList.toggle("active",x===b));render()});$("search").oninput=e=>{S.q=e.target.value.trim();render()};$("clear").onclick=()=>{S.q="";$("search").value="";render()};load();
</script></body></html>
