<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>9M Help Center Admin</title>
<style>
body{margin:0;font-family:system-ui;background:#071f1a;color:#fff}.wrap{max-width:1200px;margin:auto;padding:24px}.card{background:#0b342b;border:1px solid #376b58;border-radius:16px;padding:18px;margin-bottom:16px}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;padding:11px;border-radius:9px;border:1px solid #497764;background:#08271f;color:#fff}textarea{min-height:100px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}.primary{background:#ffd756;color:#2a2100}.danger{background:#e96363;color:white}.muted{color:#aac2ba}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}.tab{background:#16483c;color:#fff}.tab.active{background:#ffd756;color:#2a2100}.row{border-top:1px solid #285547;padding:12px 0}.hidden{display:none}.top{display:flex;justify-content:space-between;align-items:center;gap:10px}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<h1>9M Help Center Admin</h1>
<div id="login" class="card"><h2>Administrator Login</h2><div class="grid"><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"></div><br><button class="btn primary" id="loginBtn">Login</button><p class="muted">Create the user in Supabase Authentication, then add the user ID to public.user_profiles.</p></div>
<div id="app" class="hidden">
<div class="card top"><div><strong id="userEmail"></strong><div class="muted" id="role"></div></div><button class="btn" id="logoutBtn">Logout</button></div>
<div class="tabs"><button class="btn tab active" data-table="articles">FAQ Articles</button><button class="btn tab" data-table="categories">Categories</button><button class="btn tab" data-table="announcements">Announcements</button><button class="btn tab" data-table="service_status">Service Status</button><button class="btn tab" data-table="support_channels">Support Channels</button></div>
<div class="card"><div class="top"><h2 id="sectionTitle">FAQ Articles</h2><button class="btn primary" id="newBtn">+ New</button></div><div id="form" class="hidden"></div><div id="rows"></div></div>
</div></div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
let supabase,session,table="articles",editing=null,cache={categories:[]};
const $=id=>document.getElementById(id);
async function config(){const r=await fetch("/.netlify/functions/config");if(!r.ok)throw new Error("Missing config function");return r.json()}
try{const c=await config();supabase=createClient(c.url,c.anonKey);const {data}=await supabase.auth.getSession();if(data.session)enter(data.session)}catch(e){$("login").insertAdjacentHTML("beforeend",`<p style="color:#ff8a8a">${e.message}</p>`)}
$("loginBtn").onclick=async()=>{const {data,error}=await supabase.auth.signInWithPassword({email:$("email").value,password:$("password").value});if(error)return alert(error.message);enter(data.session)}
$("logoutBtn").onclick=async()=>{await supabase.auth.signOut();location.reload()}
async function enter(s){session=s;$("login").classList.add("hidden");$("app").classList.remove("hidden");$("userEmail").textContent=s.user.email;await load()}
async function api(method,payload={}){const r=await fetch("/api/admin",{method,headers:{"content-type":"application/json","authorization":"Bearer "+session.access_token},body:method==="GET"?null:JSON.stringify(payload)});const j=await r.json();if(!r.ok)throw new Error(j.error||"Request failed");return j}
async function load(){if(table!=="categories"&&!cache.categories.length){const r=await fetch("/api/admin?table=categories",{headers:{authorization:"Bearer "+session.access_token}});const j=await r.json();cache.categories=j.data||[]}$("sectionTitle").textContent=document.querySelector(`.tab[data-table="${table}"]`).textContent;const j=await fetch("/api/admin?table="+table,{headers:{authorization:"Bearer "+session.access_token}}).then(r=>r.json());$("role").textContent="Role: "+(j.role||"");renderRows(j.data||[])}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{table=b.dataset.table;editing=null;$("form").classList.add("hidden");document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b));load()})
$("newBtn").onclick=()=>showForm({})
function fields(row){const common=(n,label,type="text")=>`<label>${label}<${type==="textarea"?"textarea":"input"} id="f_${n}" ${type==="checkbox"?`type="checkbox" ${row[n]?"checked":""}`:`value="${String(row[n]??"").replaceAll('"',"&quot;")}"`}>${type==="textarea"?(row[n]??""):""}${type==="textarea"?"</textarea>":""}</label>`;
if(table==="articles")return `<div class="grid"><label>Category<select id="f_category_id">${cache.categories.map(c=>`<option value="${c.id}" ${row.category_id===c.id?"selected":""}>${c.name_en}</option>`).join("")}</select></label>${common("sort_order","Sort order")}${common("title_bn","Title Bangla")}${common("title_en","Title English")}${common("content_bn","Content Bangla","textarea")}${common("content_en","Content English","textarea")}${common("keywords_bn","Keywords Bangla")}${common("keywords_en","Keywords English")}<label>Status<select id="f_status"><option>published</option><option>draft</option><option>archived</option></select></label><label><input id="f_is_popular" type="checkbox" ${row.is_popular?"checked":""}> Popular</label></div>`;
if(table==="categories")return `<div class="grid">${common("slug","Slug")}${common("icon","Icon")}${common("name_bn","Name Bangla")}${common("name_en","Name English")}${common("sort_order","Sort order")}<label><input id="f_is_active" type="checkbox" ${row.is_active!==false?"checked":""}> Active</label></div>`;
if(table==="announcements")return `<div class="grid">${common("title_bn","Title Bangla")}${common("title_en","Title English")}${common("body_bn","Body Bangla","textarea")}${common("body_en","Body English","textarea")}<label>Level<select id="f_level"><option>info</option><option>warning</option><option>critical</option><option>success</option></select></label>${common("sort_order","Sort order")}<label><input id="f_is_active" type="checkbox" ${row.is_active!==false?"checked":""}> Active</label></div>`;
if(table==="service_status")return `<div class="grid">${common("service_key","Service key")}${common("label_bn","Label Bangla")}${common("label_en","Label English")}<label>State<select id="f_state"><option>normal</option><option>maintenance</option><option>delayed</option><option>offline</option></select></label>${common("note_bn","Note Bangla")}${common("note_en","Note English")}${common("sort_order","Sort order")}</div>`;
return `<div class="grid">${common("channel_key","Channel key")}${common("icon","Icon")}${common("label_bn","Label Bangla")}${common("label_en","Label English")}${common("url","URL")}${common("sort_order","Sort order")}<label><input id="f_is_active" type="checkbox" ${row.is_active!==false?"checked":""}> Active</label></div>`}
function showForm(row){editing=row.id||null;$("form").innerHTML=fields(row)+`<br><div class="actions"><button class="btn primary" id="saveBtn">Save</button><button class="btn" id="cancelBtn">Cancel</button></div>`;$("form").classList.remove("hidden");for(const k of ["status","level","state"])if(row[k]&&$("f_"+k))$("f_"+k).value=row[k];$("cancelBtn").onclick=()=>{$("form").classList.add("hidden")};$("saveBtn").onclick=save}
function collect(){const obj={};$("form").querySelectorAll("[id^=f_]").forEach(el=>{const k=el.id.slice(2);obj[k]=el.type==="checkbox"?el.checked:(k==="sort_order"?Number(el.value||0):el.value)});return obj}
async function save(){try{const row=collect();await api(editing?"PUT":"POST",{table,row,id:editing});$("form").classList.add("hidden");editing=null;if(table==="categories")cache.categories=[];load()}catch(e){alert(e.message)}}
function renderRows(rows){$("rows").innerHTML=rows.map(r=>`<div class="row"><div class="top"><div><strong>${r.title_en||r.name_en||r.label_en||r.channel_key||r.service_key||r.slug}</strong><div class="muted">${r.title_bn||r.name_bn||r.label_bn||""}</div></div><div class="actions"><button class="btn edit" data-id="${r.id}">Edit</button><button class="btn danger del" data-id="${r.id}">Delete</button></div></div></div>`).join("")||'<p class="muted">No records.</p>';$("rows").querySelectorAll(".edit").forEach(b=>b.onclick=()=>showForm(rows.find(x=>x.id===b.dataset.id)));$("rows").querySelectorAll(".del").forEach(b=>b.onclick=async()=>{if(!confirm("Delete this record?"))return;try{await api("DELETE",{table,id:b.dataset.id});load()}catch(e){alert(e.message)}})}
</script></body></html>
